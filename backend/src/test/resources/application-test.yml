# Profil test : H2 en mémoire (pas de MySQL)
bareme:
  import:
    path: ""

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

logging:
  level:
    root: WARN
    com.mikaservices.platform: INFO
