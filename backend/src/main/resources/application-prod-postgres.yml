# Production avec PostgreSQL (ex. Render)
# Active avec : SPRING_PROFILES_ACTIVE=prod,prod-postgres
# DATABASE_URL au format Render : postgresql://user:password@host:port/dbname
# ou JDBC : jdbc:postgresql://host:port/dbname (avec DATABASE_USERNAME / DATABASE_PASSWORD)

# Schémas hérités / imports : colonnes texte parfois en BYTEA → lower() et LIKE échouent.
# Désactiver explicitement avec BAREME_FIX_PG_TEXT_COLUMNS=false ou bareme.fix-pg-text-columns=false
bareme:
  fix-pg-text-columns: true

spring:
  datasource:
    # Si DATABASE_URL est déjà en jdbc:postgresql://, utilisé tel quel avec USERNAME/PASSWORD
    # Sinon ProdPostgresDataSourceConfig parse postgresql:// et fournit le DataSource
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:15}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        query.fail_on_pagination_over_collection_fetch: true
