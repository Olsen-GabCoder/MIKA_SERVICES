# Configuration Spring Boot - MIKA Services Platform
# Charge le fichier .env du répertoire de travail (ex. backend/.env) pour MAIL_*, JWT_*, etc.
spring:
  config:
    # Charge .env depuis le répertoire de travail ou backend/ (lancer depuis racine du projet)
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: mika-services-platform

  # Profil actif (dev, staging, prod)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    # Source de vérité unique: variables d'environnement (.env en local, variables plateforme en staging/prod)
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/mika_services_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 32

  # SMTP (variables d'environnement ou depuis .env)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}
          ssl:
            enable: ${MAIL_SSL_ENABLE:false}
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000

# Configuration serveur (PORT injecté par Render en prod)
server:
  port: ${PORT:9090}
  servlet:
    context-path: /api

# Configuration application
app:
  jwt:
    secret: ${JWT_SECRET:}  # Variable d'environnement requise
    expiration: ${JWT_EXPIRATION_MS:900000}  # 15 minutes par défaut
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 jours par défaut
  auth:
    lockout-max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
    lockout-duration-minutes: ${AUTH_LOCKOUT_DURATION_MINUTES:15}
    refresh-cookie:
      name: ${REFRESH_COOKIE_NAME:refreshToken}
      path: ${REFRESH_COOKIE_PATH:/api}
      max-age-seconds: ${REFRESH_COOKIE_MAX_AGE:604800}
      secure: ${REFRESH_COOKIE_SECURE:false}
      same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}  # Origines séparées par virgule
  upload:
    dir: ${UPLOAD_DIR:uploads}
  meteo:
    api-key: ${METEO_API_KEY:}
    default-city: ${METEO_DEFAULT_CITY:Libreville}
  mail:
    frontend-base-url: ${FRONTEND_BASE_URL:}
    from: ${MAIL_FROM:noreply@mikaservices.com}
    # Priorité : Brevo > Resend > SMTP (toutes API en HTTPS, pas de blocage réseau Render)
    brevo-api-key: ${BREVO_API_KEY:}
    resend-api-key: ${RESEND_API_KEY:}
    notify-on-login: ${MAIL_NOTIFY_ON_LOGIN:true}
  scheduler:
    session-cleanup-cron: ${SESSION_CLEANUP_CRON:0 0 3 * * ?}
    password-reset-cleanup-cron: ${PASSWORD_RESET_CLEANUP_CRON:0 0 4 * * ?}
    digest-cron: ${DIGEST_CRON:0 0 * * * ?}
    rappel-projet-mercredi: ${RAPPEL_PROJET_MERCREDI_CRON:0 0 8 * * WED}
    rappel-projet-jeudi: ${RAPPEL_PROJET_JEUDI_CRON:0 0 16 * * THU}
    pv-hebdo-jeudi: ${PV_HEBDO_JEUDI_CRON:0 15 13 * * *}
    rapport-hebdo-jeudi: ${RAPPORT_HEBDO_JEUDI_CRON:0 15 13 * * *}
  rate-limit:
    login-max-attempts: ${LOGIN_RATE_LIMIT_MAX:5}
    login-window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}
  init:
    # Admin initial : uniquement via variables d'environnement (jamais en dur dans le code).
    # Si les deux sont définis au démarrage, un compte SUPER_ADMIN est créé (une seule fois).
    admin:
      email: ${INIT_ADMIN_EMAIL:}
      password: ${INIT_ADMIN_PASSWORD:}

# Multipart (upload fichiers)
spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 50MB

# Configuration Swagger (Springdoc 2.x)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

# Logs — niveaux de base raisonnables (DEBUG uniquement en dev si besoin)
logging:
  level:
    root: INFO
    com.mikaservices.platform: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.springframework.mail: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"