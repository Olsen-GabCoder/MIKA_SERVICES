# Profil Docker (phase de test) : même config BDD que prod mais ddl-auto: update pour créer le schéma
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:10}
      minimum-idle: ${HIKARI_MIN_IDLE:3}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

logging:
  level:
    root: INFO
    com.mikaservices.platform: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
