# Configuration Production
# Ne pas mettre driver-class-name ici : c'est application-prod-postgres.yml qui le définit
# selon la base réellement utilisée. Laisser ce fichier agnostique au moteur SQL.
app:
  mail:
    frontend-base-url: ${FRONTEND_BASE_URL:https://mika-services.up.railway.app}
  auth:
    refresh-cookie:
      secure: true
      same-site: Strict

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    # driver-class-name : NE PAS définir ici.
    # Render utilise prod + prod-postgres → application-prod-postgres.yml définit org.postgresql.Driver.
    # Si un autre environnement prod utilise MySQL, créer application-prod-mysql.yml à la place.
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:15}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    # open-in-view: false est OBLIGATOIRE avec le chemin PostgreSQL natif (findAllByIdWithAssociations).
    # Laisser à true provoquerait des sessions ouvertes trop longtemps ; à false les @Transactional
    # dans BaremeLectureService garantissent que les associations sont chargées dans la même session.
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
        query.fail_on_pagination_over_collection_fetch: true

logging:
  level:
    root: WARN
    com.mikaservices.platform: WARN
    org.springframework: WARN
    org.hibernate: WARN