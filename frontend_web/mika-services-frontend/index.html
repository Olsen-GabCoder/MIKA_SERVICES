<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo_mika_services.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MIKA Services</title>
    <script>
      (function() {
        var key = 'mika-theme';
        var stored = typeof localStorage !== 'undefined' && (localStorage.getItem(key) === 'dark' || localStorage.getItem(key) === 'light')
          ? localStorage.getItem(key) : 'light';
        var html = document.documentElement;
        html.setAttribute('data-theme', stored);
        if (stored === 'dark') html.classList.add('dark'); else html.classList.remove('dark');
        var isDark = stored === 'dark';
        html.style.setProperty('--mika-bg-content', isDark ? 'rgb(17 24 39)' : 'rgba(237 242 244 / 0.8)');
        html.style.setProperty('--mika-bg-card', isDark ? 'rgb(31 41 55)' : 'rgb(255 255 255)');
        html.style.setProperty('--mika-border-card', isDark ? 'rgb(75 85 99)' : 'rgb(229 231 235)');
        html.style.setProperty('--mika-text-primary', isDark ? 'rgb(243 244 246)' : 'rgb(17 24 39)');
      })();
    </script>
    <script>
      (function() {
        var key = 'mika-locale';
        var stored = typeof localStorage !== 'undefined' && (localStorage.getItem(key) === 'fr' || localStorage.getItem(key) === 'en')
          ? localStorage.getItem(key) : 'fr';
        document.documentElement.lang = stored;
        if (typeof window !== 'undefined') window.__INITIAL_LOCALE__ = stored;
      })();
    </script>
    <script>
      (function() {
        var key = 'mika-animations';
        var stored = typeof localStorage !== 'undefined' && ['full', 'reduced', 'none'].indexOf(localStorage.getItem(key)) >= 0
          ? localStorage.getItem(key) : 'full';
        document.documentElement.setAttribute('data-animations', stored);
      })();
    </script>
    <script>
      (function() {
        var sizeKey = 'mika-font-size';
        var familyKey = 'mika-font-family';
        var densityKey = 'mika-density';
        var sizeMap = { small: '87.5%', default: '112.5%', medium: '118.75%', large: '125%' };
        var validSizes = ['small', 'default', 'medium', 'large'];
        var validFamilies = ['inter', 'system', 'open-sans'];
        var densityScale = { comfortable: 1, compact: 0.85, spacious: 1.15 };
        var validDensities = ['comfortable', 'compact', 'spacious'];
        var html = document.documentElement;
        if (typeof localStorage !== 'undefined') {
          var sizeStored = localStorage.getItem(sizeKey);
          var size = validSizes.indexOf(sizeStored) >= 0 ? sizeStored : 'default';
          html.style.setProperty('--mika-font-size', sizeMap[size]);
          var familyStored = localStorage.getItem(familyKey);
          var family = validFamilies.indexOf(familyStored) >= 0 ? familyStored : 'system';
          html.setAttribute('data-font', family);
          var densityStored = localStorage.getItem(densityKey);
          var density = validDensities.indexOf(densityStored) >= 0 ? densityStored : 'comfortable';
          html.setAttribute('data-density', density);
          html.style.setProperty('--mika-density-scale', String(densityScale[density]));
        } else {
          html.style.setProperty('--mika-font-size', '112.5%');
          html.setAttribute('data-font', 'system');
          html.setAttribute('data-density', 'comfortable');
          html.style.setProperty('--mika-density-scale', '1');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
