# MIKA Services Platform – phase de test (tout gratuit)
# Usage : à la racine du projet, définir un .env puis : docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: mika-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mika_test_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mika_services}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mika-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-mika_services}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mika_test_root}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-long-random-string}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend_web/mika-services-frontend
      dockerfile: Dockerfile
    container_name: mika-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
