# Configuration Développement
# Import barème : au démarrage, charge l'Excel si bareme.import.path existe (relatif au répertoire de travail ou backend).
# Source de vérité actuelle : docs/BASE DE DONNE F.xlsx
bareme:
  seed-enabled: false
  import:
    # IMPORTANT: laisser vide pour éviter tout ré-import automatique au démarrage.
    # Sinon le barème peut être réécrasé et casser les facettes (ex: Famille).
    path: ""

spring:
  jpa:
    hibernate:
      # update = Hibernate peut ALTER les colonnes (enums, etc.) puis relire tout le schéma (FK, index) → lourd pour mysqld.
      # Si MySQL renvoie "Out of memory" / Error 1041 au démarrage : redémarrer le service MySQL, fermer les applis gourmandes,
      # ou baisser innodb_buffer_pool_size dans my.ini si trop élevé pour la RAM disponible.
      # Contournement rapide (schéma déjà à jour) : export SPRING_JPA_HIBERNATE_DDL_AUTO=validate ou passer à validate ci‑dessous.
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.mikaservices.platform: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    # TRACE sur chaque paramètre JDBC = logs énormes au démarrage ; DEBUG suffit en général.
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG